<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoV APK - Aipplazz2017</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Chakra Petch', sans-serif; }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a; /* พื้นหลังสีเข้มกันพลาด */
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('https://images.alphacoders.com/120/1208746.jpg');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 15px;
        }

        .card {
            width: 100%;
            max-width: 380px;
            padding: 30px 20px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 22px;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 150, 0.3);
        }

        h1 { font-size: 28px; color: #00e676; margin-bottom: 5px; }
        .desc { color: #ccc; font-size: 14px; margin-bottom: 25px; }

        .info-grid { display: flex; gap: 10px; margin-bottom: 25px; }
        .info-item { flex: 1; background: rgba(0,0,0,0.3); padding: 12px 5px; border-radius: 15px; }
        .info-item h2 { font-size: 16px; margin-bottom: 2px; }
        .info-item p { font-size: 10px; color: #00e676; font-weight: bold; }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            font-size: 19px;
            font-weight: bold;
            border-radius: 20px;
            text-decoration: none;
            color: #003300;
            background: linear-gradient(45deg, #00c853, #b2ff59);
            box-shadow: 0 8px 20px rgba(0, 200, 83, 0.3);
            transition: 0.3s;
        }

        .btn:active { transform: scale(0.95); }

        .footer { margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.4); }
    </style>
</head>
<body>

<div class="card">
    <img class="logo" src="https://เล่นเกม.com/wp-content/uploads/2021/04/RoV-Icon.png" alt="Logo">
    <h1>RoV APK</h1>
    <p class="desc">ดาวน์โหลดเวอร์ชันล่าสุด ปลอดภัย 100%</p>

    <div class="info-grid">
        <div class="info-item"><h2>199MB</h2><p>ขนาด</p></div>
        <div class="info-item"><h2>v1.62</h2><p>เวอร์ชัน</p></div>
        <div class="info-item"><h2>2026</h2><p>อัปเดต</p></div>
    </div>

    <a class="btn" href="https://www.mediafire.com/file/kq0ts847w64787y/RoV_1.62.1.6.apks/file" target="_blank">
        ดาวน์โหลด APK
    </a>

    <div class="footer">DEVELOPED BY AIPPLAZZ2017</div>
</div>

</body>
</html>
